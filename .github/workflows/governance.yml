name: governance

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  risk-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -q pyyaml==6.0.3
      - name: scan risks
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          if [ -z "$BASE_REF" ]; then echo "::error::PR base.ref missing"; exit 1; fi
          git fetch -q origin "$BASE_REF"
          python governance/scripts/scan_risks.py \
            --diff-base "origin/$BASE_REF" \
            --config governance.config.yml

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          if [ -z "$BASE_REF" ]; then echo "::error::PR base.ref missing"; exit 1; fi
          git fetch -q origin "$BASE_REF"
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.30.1 \
            detect --source /repo \
            --log-opts="origin/${BASE_REF}..HEAD" \
            --redact --no-banner --verbose

  pr-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -q pyyaml==6.0.3
      - name: validate PR description
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          if [ -z "$BASE_REF" ]; then echo "::error::PR base.ref missing"; exit 1; fi
          git fetch -q origin "$BASE_REF"
          printf '%s' "$PR_BODY" | python governance/scripts/validate_mr.py \
            --diff-base "origin/$BASE_REF" \
            --config governance.config.yml

  test-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -q pyyaml==6.0.3
      - name: check tested evidence
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          if [ -z "$BASE_REF" ]; then echo "::error::PR base.ref missing"; exit 1; fi
          git fetch -q origin "$BASE_REF"
          python governance/scripts/check_tested.py \
            --diff-base "origin/$BASE_REF" \
            --config governance.config.yml
