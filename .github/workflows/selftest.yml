name: selftest

# DeliverHQ 集成测试门禁:PR 与推送到 main 时自动运行 selftest。
# 单人维护仓库的"机器审批人"——入口测试与 selftest 全绿才允许合并。
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  selftest:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pip install PyYAML

      - name: Run entrypoint tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m unittest discover -s tests -v

      - name: Check Node.js CLI syntax
        run: node --check bin/cli.js

      - name: Verify npm package contents
        run: npm pack --dry-run

      - name: Run DeliverHQ selftest
        # selftest 必须从 skill 目录运行;CR-EXAMPLE 的 manifest 调用 `python`,
        # setup-python 已在 PATH 中提供 `python`,无需额外 shim。
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          cd skill
          python scripts/selftest.py
