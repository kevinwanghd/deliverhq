name: selftest

# DeliverHQ 集成测试门禁:PR 与推送到 main 时自动运行 selftest。
# 单人维护仓库的"机器审批人"——入口测试与 selftest 全绿才允许合并。
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  selftest:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pip install PyYAML

      - name: Run entrypoint tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m unittest discover -s tests -v

      - name: Check Node.js CLI syntax
        run: node --check bin/cli.js

      - name: Verify npm package contents
        run: npm pack --dry-run

      - name: Run DeliverHQ selftest
        # 全量 selftest 已下沉到 dev/scripts/（不随 npm 包发布）；从仓库根运行、
        # 显式对被测核心 skill/ 执行。夹具在 dev/fixtures，运行时模块在 skill/scripts。
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python dev/scripts/selftest.py skill

  # 汇总门禁:产出一个名为 `selftest` 的稳定 check，供分支保护作为必需检查引用。
  # 上面的 matrix job 因设了 `name:` 只会产出 `ubuntu-latest / Python 3.10` 等 4 个
  # 变体 check,不存在纯 `selftest` 名的 check——本 job 补上该名,并要求 4 个变体全绿。
  # 仅涉及本 workflow,与 AgentGate 治理检查(governance.yml)完全独立。
  selftest-gate:
    name: selftest
    needs: selftest
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Require all selftest matrix jobs to pass
        run: |
          if [ "${{ needs.selftest.result }}" != "success" ]; then
            echo "::error::selftest matrix 未全部通过 (result=${{ needs.selftest.result }})"
            exit 1
          fi
          echo "✅ selftest matrix 全绿"
