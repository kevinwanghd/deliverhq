project:
  name: DeliverHQ
  type: python-node

build:
  enabled: true
  command: "node --check ../bin/cli.js"
  working_dir: "."
  timeout: 60

test:
  unit:
    enabled: true
    command: "python -m unittest discover -s ../tests -v"
    working_dir: "."
    timeout: 120
    coverage_enabled: false

lint:
  enabled: true
  tools:
    - name: selftest
      enabled: true
      command: "python scripts/selftest.py"
      working_dir: "."
      timeout: 300
      severity: error

qualitygate:
  mode: hybrid
