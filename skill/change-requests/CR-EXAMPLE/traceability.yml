schema: deliverhq-traceability
version: 1

CR-EXAMPLE:
  requirement: "实现待办事项 CRUD 接口"
  priority: "P1"

  acceptance_criteria:
    - "POST /api/todos 创建待办事项，返回 201"
    - "GET /api/todos 分页查询，支持状态筛选"
    - "PATCH /api/todos/{id} 更新，404 处理"
    - "DELETE /api/todos/{id} 软删除，返回 204"
    - "P95 < 100ms，并发 100 无错误"

  implementation:
    - file: "src/models/todo.py"
      functions:
        - "Todo"
      lines: "1-35"
      commit: "a1b2c3d"

    - file: "src/api/todos.py"
      endpoints:
        - "POST /api/todos"
        - "GET /api/todos"
        - "PATCH /api/todos/{id}"
        - "DELETE /api/todos/{id}"
      lines: "1-80"
      commit: "a1b2c3d"

    - file: "src/schemas/todo.py"
      schemas:
        - "TodoCreate"
        - "TodoUpdate"
        - "TodoResponse"
      lines: "1-60"
      commit: "a1b2c3d"

    - file: "src/main.py"
      routes:
        - "include_router(todo_router)"
        - "OpenAPI route registration"
      lines: "1-40"
      commit: "a1b2c3d"

  tests:
    - file: "tests/test_todos.py"
      cases:
        - name: "test_create_todo_success"
          covers: "验收条件 #1"
          type: "integration"
        - name: "test_list_todos_pagination"
          covers: "验收条件 #2"
          type: "integration"
        - name: "test_update_todo_not_found"
          covers: "验收条件 #3"
          type: "integration"
        - name: "test_delete_todo_soft"
          covers: "验收条件 #4"
          type: "integration"
        - name: "test_todo_api_performance_budget"
          covers: "验收条件 #5"
          type: "performance"
      lines: "1-180"
      commit: "a1b2c3d"

    - file: "tests/test_openapi_todos.py"
      cases:
        - name: "test_openapi_contains_todo_paths"
          covers: "验收条件 #5"
          type: "integration"
      lines: "1-50"
      commit: "a1b2c3d"

  data_changes:
    - type: "postgres"
      table: "todos"
      operation: "create"
      migration: "alembic/versions/001_create_todos.py"

  dependencies:
    - type: "internal_service"
      name: "PostgreSQL"
      interface: "SQLAlchemy ORM"

  impact:
