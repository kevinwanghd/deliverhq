schema: deliverhq-exceptions
version: 1

# 例外管理：记录本 CR 中对 DeliverHQ 规则或门禁的豁免申请

# 示例 1：跳过某个门禁检查
# gate_override:
#   gate: "DesignGate"
#   reason: "B 端内部管理后台，视觉要求不高，仅低保真通过"
#   approved_by: "Tech Lead"
#   approved_date: "2026-06-11"
#   conditions: "后续迭代补充高保真设计"

# 示例 2：豁免某条规则
# rule_exception:
#   rule: "rules.md #10"
#   description: "单服务类不超 3000 行"
#   reason: "历史遗留代码，本次仅小修改，重构成本高"
#   approved_by: "Tech Lead"
#   approved_date: "2026-06-11"
#   scope: "仅本次 CR，后续需拆分"
#   tracking: "技术债务已登记到 mistake-book.md"

# 示例 3：测试覆盖率豁免
# coverage_exception:
#   target: "80%"
#   actual: "68%"
#   reason: "外部 API mock 困难，契约测试覆盖"
#   approved_by: "QA Lead"
#   approved_date: "2026-06-11"
#   mitigation: "契约测试已补充，记录到 test-plan.md"

# 本 CR 例外清单（空表示无例外）
exceptions:
  - gate_override:
      gate: PermissionGate
      reason: package.json 仅移除 npm 发布包中的 CHANGELOG，恢复 1.2 MB 体积预算；仓库文件不删除，运行时 Interface 不变
      approved_by: Kevin
      approved_date: 2026-07-12
      conditions: npm packaging budget、entrypoint tests 与 selftest 必须全部通过

# 使用说明：
# 1. 仅在确有合理理由时申请例外
# 2. 必须有审批人与日期
# 3. 需明确缓解措施或后续计划
# 4. 例外不得违反 P0 规则（如：敏感信息硬编码）
