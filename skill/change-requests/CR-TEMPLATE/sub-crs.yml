# sub-crs.yml — Epic 子任务清单
#
# 由 create_sub_cr.py 自动维护。
# 人工可修改 title/depends_on，不要手动修改 id 和 status。
#
# 用法：
#   python3 scripts/create_sub_cr.py {{CR_ID}} --title "子任务名称"
#   python3 scripts/create_sub_cr.py {{CR_ID}} --list
#   python3 scripts/create_sub_cr.py {{CR_ID}} --status

epic: "{{CR_ID}}"
title: "{{CR_NAME}}"
created_at: "{{DATE}}"

sub_crs: []
  # 示例（由 create_sub_cr.py 自动添加）：
  # - id: {{CR_ID}}-01
  #   title: "子任务 1"
  #   status: pending       # pending / in_progress / completed
  #   depends_on: []
  #   created_at: "..."
  #
  # - id: {{CR_ID}}-02
  #   title: "子任务 2"
  #   status: pending
  #   depends_on: [{{CR_ID}}-01]
  #   created_at: "..."
